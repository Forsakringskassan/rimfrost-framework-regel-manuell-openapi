openapi: 3.1.0
info:
  title: Regel Manuell API
  version: 1.0.0
  description: Gemensamt API för en manuell regel

paths:
  /utokadUppgiftsbeskrivning:
    get:
      tags: [RegelManuellController]
      operationId: getUtokadUppgiftsbeskrivning
      summary: Hämta utökad beskrivning av uppgift
      responses:
        "200":
          description: Hämtning av utökad uppgiftsbeskrivning slutförd OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUtokadUppgiftsbeskrivningResponse"

  /{handlaggningId}/done:
    post:
      tags: [RegelManuellController]
      operationId: markDone
      summary: Slutför manuell kontroll
      description: Markerar ett handläggningsärende som färdigbehandlat
      parameters:
        - name: handlaggningId
          in: path
          required: true
          description: ID för handläggningsärendet
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Kontroll slutförd OK
        "404":
          description: Informationen hittades inte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP-statuskod
          example: 404
        message:
          type: string
          description: Beskrivning av felet
          example: Handläggningsärendet hittades inte

    GetUtokadUppgiftsbeskrivningResponse:
      type: object
      properties:
        beskrivning:
          type: string
